---
- name: Configure Apache Web Server
  hosts: web
  become: yes

  tasks:

  - name: Install Apache
    dnf:
     name: httpd
     state: present

  - name: Start Apache
    service:
     name: httpd
     state: started

  - name: Enable Apache
    service:
     name: httpd
     enabled: yes
  
  - name: Create custom index page
    copy:
     dest: /var/www/html/index.html
     content: |
      <h1>Welcome to My Enterprise Ansible Project</h1>
      <h2>Managed by Ansible</h2>
